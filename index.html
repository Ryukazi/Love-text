<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Love You Rain</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
      font-family: 'Arial Black', sans-serif;
    }

    /* Stars background */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Falling text style */
    .love {
      position: absolute;
      top: -50px;
      font-size: 2rem;
      color: #ff007f;
      text-shadow: 0 0 10px #ff007f, 0 0 20px #ff3399, 0 0 40px #ff66b2;
      animation: fall linear forwards;
      z-index: 1;
      white-space: nowrap;
      opacity: 0.9;
    }

    @keyframes fall {
      0% {
        top: -50px;
        opacity: 1;
        transform: translateX(0px);
      }
      50% {
        transform: translateX(20px);
      }
      100% {
        top: 100%;
        opacity: 0.5;
        transform: translateX(-20px);
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <script>
    // Starfield Effect
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    let stars = [];
    let numStars = 150;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.5 + 0.2
      });
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.speed;
        if (star.y > canvas.height) {
          star.y = 0;
          star.x = Math.random() * canvas.width;
        }
      }
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // Create many "I LOVE YOU"
    function createLove() {
      const love = document.createElement("div");
      love.className = "love";
      love.innerText = "I LOVE YOU";

      // Random position & size
      love.style.left = Math.random() * (window.innerWidth - 150) + "px";
      love.style.fontSize = (1.5 + Math.random() * 2.5) + "rem";

      // Random speed
      let duration = 3 + Math.random() * 4; // 3s - 7s
      love.style.animationDuration = duration + "s";

      document.body.appendChild(love);

      // Remove after falling
      setTimeout(() => {
        love.remove();
      }, duration * 1000 + 500);
    }

    // Spam texts faster for more effect
    setInterval(createLove, 150); // every 0.15s
  </script>
</body>
    </html>
